name: Create Tag
on:
  push:
    branches:
      - main

jobs:
  create-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.create_tag.outputs.tag }}
    permissions:
      contents: write # Grants write permission for repository contents
      packages: write  # Grants read permission for GitHub Packages
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get latest tag
        id: get_tag
        run: |
          # Get the latest tag, or use v0.0.0 if no tags exist
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Calculate next version
        id: next_version
        run: |
          LATEST_TAG="${{ steps.get_tag.outputs.latest_tag }}"

          # Remove 'v' prefix and split version
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Check commit messages for version bump type
          COMMIT_MSG=$(git log -1 --pretty=%B)

          if [[ $COMMIT_MSG == *"BREAKING CHANGE"* ]] || [[ $COMMIT_MSG == *"[major]"* ]]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [[ $COMMIT_MSG == *"feat:"* ]] || [[ $COMMIT_MSG == *"[minor]"* ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Next version: $NEW_TAG"

      - name: Create and push tag
        id: create_tag
        run: |
          NEW_TAG="${{ steps.next_version.outputs.new_tag }}"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create and push the tag
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"

          echo "Created and pushed tag: $NEW_TAG"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

  publish-release:
    runs-on: ubuntu-latest
    needs: create-tag
    env:
      PUBLISH_TAG: ${{ needs.create-tag.outputs.tag }}
    permissions:
      contents: write # Required to create a release and upload assets
      packages: write  # Grants read permission for GitHub Packages

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        uses: ncipollo/release-action@v1

        with:
          tag: ${{ env.PUBLISH_TAG }} # Uses the pushed tag as the release tag
          name: Release ${{ env.PUBLISH_TAG }} # Sets the release name
          body: |
            # Release Notes for ${{ env.PUBLISH_TAG }}
            This is a new release of the project.
            
            ## Features:
            Terraform Module for managing AWS KMS Key
          draft: false # Set to true to create a draft release
          prerelease: false # Set to true for pre-releases
          generateReleaseNotes: true # Automatically generate release notes based on commits
          # Optionally, upload assets to the release
          # artifacts: "path/to/your/artifact.zip" 